name: Deploy Preview to External Pages Repo

on:
  push:
    branches:
      - pages-preview
  workflow_dispatch:
    inputs:
      preview_repository:
        description: 'External preview repository in owner/name format'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: preview-pages-external
  cancel-in-progress: true

env:
  PREVIEW_PAGES_REPOSITORY: ${{ github.event_name == 'workflow_dispatch' && inputs.preview_repository || format('{0}/{1}-preview', github.repository_owner, github.event.repository.name) }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build preview project
        env:
          VITE_SHEETS_API_URL: ${{ vars.VITE_SHEETS_API_URL }}
          VITE_RELEASE_CHANNEL: preview
        run: npm run build

      - name: Deploy preview to external repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PREVIEW_PAGES_TOKEN }}
          external_repository: ${{ env.PREVIEW_PAGES_REPOSITORY }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          full_commit_message: >-
            preview: deploy from ${{ github.repository }}@${{ github.sha }}